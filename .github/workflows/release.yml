name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            arch: aarch64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            arch: x86_64
          - platform: ubuntu-22.04
            args: ""
            arch: x86_64
          - platform: windows-latest
            args: ""
            arch: x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Linux-only: install required system libraries for WebKit/GTK
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ResourceScope ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/Cosm00/resourcescope/blob/main/CHANGELOG.md) for details.

            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.app.tar.gz` / `.dmg` (aarch64) |
            | macOS (Intel) | `.app.tar.gz` / `.dmg` (x86_64) |
            | Windows | `.msi` / `.exe` (NSIS) |
            | Linux | `.AppImage` / `.deb` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
